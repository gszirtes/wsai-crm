services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-wespeak_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-wespeak_crm}
      JWT_SECRET: ${JWT_SECRET}
      FERNET_KEY: ${FERNET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wespeak.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3010}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat-v3-0324:free}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      RATE_LIMITING_ENABLED: ${RATE_LIMITING_ENABLED:-true}
    ports:
      - "127.0.0.1:8010:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${FRONTEND_URL:-http://localhost:3010}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3010:80"

  # Phase 6: MCP server -- optional, only starts if CRM_MCP_API_KEY is set
  # (a service account minted via the Settings > Service Accounts UI or the
  # /api/service-accounts API). Talks to `backend` over the same internal
  # compose network, never touches the database directly.
  mcp-server:
    build: ./mcp-server
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CRM_API_BASE_URL: http://backend:8001
      CRM_API_KEY: ${CRM_MCP_API_KEY:-}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8100
    ports:
      - "127.0.0.1:8100:8100"

volumes:
  pgdata:
